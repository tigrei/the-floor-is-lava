<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sea Trail — First Island Chain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <h1>Sea Trail</h1>
      <div id="controls">
        <span id="day-counter">Day 1</span>
        <span id="score-display">Delivered: 0/0</span>
      </div>
    </header>

    <div id="main">
      <section id="map-area">
        <canvas id="map-canvas"></canvas>
      </section>

      <aside id="sidebar">
        <div id="ship-status"></div>
        <div id="actions-panel"></div>
        <div id="requests-panel"></div>
        <div id="log">
          <h3>Ops Log</h3>
          <ul id="log-entries"></ul>
        </div>
      </aside>
    </div>

    <div id="modal-overlay" class="hidden">
      <div id="modal">
        <h2 id="modal-title"></h2>
        <div id="modal-body"></div>
        <div id="modal-choices"></div>
      </div>
    </div>

  </div>

  <script src="data_master/supply-data.js"></script>
  <script src="events-data.js"></script>
  <script src="events.js"></script>
  <script src="map.js"></script>
  <script src="ui.js"></script>
  <script src="game.js"></script>
</body>
</html>
