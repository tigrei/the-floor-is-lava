<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sea Trail — First Island Chain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <h1>Sea Trail</h1>
      <div id="controls">
        <button id="btn-sail" data-running="false">Ahead Full</button>
        <span id="day-counter">Day 1</span>
      </div>
    </header>

    <div id="main">
      <section id="map-area">
        <canvas id="map-canvas"></canvas>
      </section>

      <aside id="sidebar">
        <h2>Ship Status</h2>
        <ul id="resources">
          <li>Deterrence: <span id="res-deterrence">0</span></li>
          <li>Funds: $<span id="res-funds">50</span></li>
          <li>Crew Health: <span id="res-health">100</span>%</li>
          <li>Hull: <span id="res-ship">100</span>%</li>
          <li>Cargo: <span id="res-cargo">80</span> / <span id="res-cargo-max">100</span>t</li>
          <li>Fuel: <span id="res-fuel">80</span></li>
          <li>Distance: <span id="res-distance">0</span> nm</li>
        </ul>
        <div id="log">
          <h3>Ops Log</h3>
          <ul id="log-entries"></ul>
        </div>
      </aside>
    </div>

    <div id="modal-overlay" class="hidden">
      <div id="modal">
        <h2 id="modal-title"></h2>
        <div id="modal-body"></div>
        <div id="modal-choices"></div>
      </div>
    </div>

  </div>

  <script src="events-data.js"></script>
  <script src="events.js"></script>
  <script src="map.js"></script>
  <script src="ui.js"></script>
  <script src="game.js"></script>
</body>
</html>
